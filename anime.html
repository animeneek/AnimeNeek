<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AnimeNeek | Anime Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050505;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }
        
        /* Hero Background Image - matching index.html */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.35;
        }
        
        /* Dark overlay - matching index.html style */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.6) 100%);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 1;
        }
        
        /* Glassmorphic cards - matching index.html */
        .glass-card {
            background: rgba(10, 10, 10, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
        }
        
        /* Accent color */
        .accent-red {
            color: #ff4444;
        }
        
        /* Genre tag - matching index.html */
        .genre-tag {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* Status pill */
        .status-pill {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Source button */
        .source-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .source-btn:hover {
            background: rgba(255, 68, 68, 0.2);
            border-color: rgba(255, 68, 68, 0.4);
        }
        
        .source-btn.active {
            background: #ff4444;
            border-color: #ff4444;
            color: white;
        }
        
        /* Dropdown styling */
        .episode-select {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }
        
        .episode-select:focus {
            outline: none;
            border-color: #ff4444;
        }
        
        .episode-select option {
            background: #1a1a1a;
            color: white;
        }
        
        /* Player iframe */
        .player-iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 1rem;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff4444;
            border-radius: 4px;
        }
        
        /* Synopsis clamp */
        .synopsis-clamp {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }
        
        /* Recommendation card - matching index.html style */
        .rec-card {
            transition: transform 0.2s ease;
        }
        
        .rec-card:hover {
            transform: translateY(-4px);
        }
        
        /* Loading spinner */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top: 3px solid #ff4444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Section headers - white text */
        .section-header {
            color: white;
        }
        
        /* Mobile adjustments */
        @media (max-width: 768px) {
            .glass-card {
                border-radius: 1rem;
            }
            
            .source-btn {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }
            
            .episode-select {
                max-width: 100%;
                font-size: 0.85rem;
            }
            
            .recommendation-title {
                font-size: 0.7rem !important;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Background Image -->
    <img id="heroBg" class="hero-bg" src="" alt="Background">
    <div class="overlay"></div>

    <!-- Back button - matching index.html style -->
    <div class="fixed top-4 left-4 z-50">
        <a href="index.html" class="glass-card inline-flex items-center gap-2 px-4 py-2 rounded-full text-white/80 hover:text-white transition">
            <i class="fas fa-arrow-left"></i>
            <span class="hidden sm:inline">Back to Home</span>
        </a>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8 pt-20 pb-24 relative z-10">
        
        <!-- Loading State -->
        <div id="loadingState" class="glass-card p-12 text-center">
            <div class="loader mb-4"></div>
            <p class="text-white/60 text-sm">Loading anime details...</p>
        </div>
        
        <!-- Anime Info Section -->
        <div id="info" class="glass-card p-6 md:p-8 mb-8 hidden"></div>
        
        <!-- Watch Section -->
        <div id="watchSection" class="glass-card p-6 md:p-8 mb-8 hidden">
            <h2 class="section-header text-xl md:text-2xl font-bold mb-5 flex items-center gap-2">
                <i class="fas fa-play-circle accent-red"></i> Watch Now
            </h2>
            
            <!-- Player -->
            <div id="player" class="w-full aspect-video bg-black/50 rounded-xl overflow-hidden flex items-center justify-center text-center text-gray-400 mb-6">
                <div id="player-placeholder" class="px-6">
                    <i class="fas fa-film text-4xl mb-2 opacity-50"></i>
                    <p class="text-sm">Select an episode to start watching</p>
                </div>
            </div>
            
            <!-- Episode Selection - Dropdown below title -->
            <div class="flex flex-col gap-3 mb-4">
                <h3 class="section-header text-lg font-bold flex items-center gap-2">
                    <i class="fas fa-list-ol accent-red"></i> Select Episode
                </h3>
                <select id="episodeDropdown" class="episode-select">
                    <option value="">-- Choose Episode --</option>
                </select>
            </div>
            
            <!-- Sources -->
            <h3 class="section-header text-lg font-bold mb-3 flex items-center gap-2 mt-4">
                <i class="fas fa-database accent-red"></i> Streaming Source
            </h3>
            <div id="sources" class="flex gap-3 flex-wrap"></div>
        </div>
        
        <!-- Characters Section -->
        <div id="charactersSection" class="glass-card p-6 md:p-8 mb-8 hidden">
            <h2 class="section-header text-xl md:text-2xl font-bold mb-5 flex items-center gap-2">
                <i class="fas fa-users accent-red"></i> Characters & Voice Actors
            </h2>
            <div id="characters-grid" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div>
        </div>
        
        <!-- Staff Section -->
        <div id="staffSection" class="glass-card p-6 md:p-8 mb-8 hidden">
            <h2 class="section-header text-xl md:text-2xl font-bold mb-5 flex items-center gap-2">
                <i class="fas fa-user-tie accent-red"></i> Staff
            </h2>
            <div id="staff-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-4"></div>
        </div>
        
        <!-- Recommendations Section -->
        <div id="recSection" class="glass-card p-6 md:p-8 hidden">
            <h2 class="section-header text-xl md:text-2xl font-bold mb-5 flex items-center gap-2">
                <i class="fas fa-clone accent-red"></i> Recommended For You
            </h2>
            <div id="recommendations-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        
        if (!id) {
            window.location.href = "index.html";
        }
        
        const ANILIST_API = "https://graphql.anilist.co";
        const FALLBACK_IMG = "https://github.com/animeneek/Neek/blob/main/assets/images/Poster%20404%20Error.png?raw=true";
        const HERO_FALLBACK = "https://github.com/animeneek/Neek/blob/main/assets/images/Prabhas_02.jpg?raw=true";
        
        let currentEpisode = null;
        let malId = null;
        let animeData = null;
        
        // JSON data storage for episodes
        let jsonData = null;
        let jsonEpisodeMap = new Map();
        
        // Set hero background
        function setHeroBackground(bannerUrl) {
            const heroImg = document.getElementById('heroBg');
            if (bannerUrl && bannerUrl.trim() !== '' && !bannerUrl.includes('default')) {
                heroImg.src = bannerUrl;
            } else {
                heroImg.src = HERO_FALLBACK;
            }
        }
        
        // Fetch JSON data
        async function fetchJsonData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/18otaku/streamtape-json/main/ha.json');
                const data = await response.json();
                jsonData = data;
                console.log('JSON data loaded:', jsonData ? 'Yes' : 'No');
            } catch (error) {
                console.error('Failed to load JSON data:', error);
                jsonData = null;
            }
        }
        
        // Check if current anime exists in JSON and build episode map
        function checkJsonAnime() {
            if (!jsonData || !jsonData.files) {
                console.log('No JSON data available');
                jsonEpisodeMap.clear();
                return false;
            }
            
            jsonEpisodeMap.clear();
            
            // Log for debugging
            console.log('Searching for anime with malId:', malId, 'or anilist_id:', id);
            
            const animeFiles = jsonData.files.filter(file => {
                return (file.mal_id == malId) || (file.anilist_id == id);
            });
            
            console.log('Found files:', animeFiles.length);
            
            if (animeFiles.length === 0) {
                return false;
            }
            
            animeFiles.forEach(file => {
                const title = file.title;
                console.log('Processing file:', title);
                
                // Extract episode number from title format [ID-EP] or [ID-EP] [Extra]
                const episodeMatch = title.match(/\[.*?-(\d+)\]/);
                if (episodeMatch) {
                    const episodeNum = parseInt(episodeMatch[1]);
                    const isUncensored = title.includes('[Uncen]');
                    
                    if (!jsonEpisodeMap.has(episodeNum)) {
                        jsonEpisodeMap.set(episodeNum, []);
                    }
                    jsonEpisodeMap.get(episodeNum).push({
                        vidcode: file.vidcode,
                        isUncensored: isUncensored
                    });
                    console.log(`Added episode ${episodeNum} with ${isUncensored ? 'Uncensored' : 'Censored'} source`);
                } else {
                    console.log('Could not extract episode number from:', title);
                }
            });
            
            console.log('Total episodes in map:', jsonEpisodeMap.size);
            return jsonEpisodeMap.size > 0;
        }
        
        const QUERY = `
        query($id: Int) {
            Media(id: $id, type: ANIME) {
                id
                idMal
                title { romaji english native }
                description(asHtml: false)
                coverImage { extraLarge large }
                bannerImage
                startDate { year }
                episodes
                averageScore
                genres
                status
                format
                nextAiringEpisode {
                    episode
                    timeUntilAiring
                }
                characters(sort: ROLE, perPage: 12) {
                    edges {
                        role
                        node { id name { full } image { large } }
                        voiceActors(sort: RELEVANCE) {
                            id
                            languageV2
                            name { full }
                            image { large }
                        }
                    }
                }
                staff(perPage: 12) {
                    edges {
                        role
                        node { id name { full } image { large } }
                    }
                }
                recommendations(perPage: 10) {
                    edges {
                        node {
                            mediaRecommendation {
                                id
                                title { romaji english }
                                coverImage { large }
                                averageScore
                                status
                            }
                        }
                    }
                }
            }
        }
        `;
        
        async function fetchAnime() {
            await fetchJsonData();
            const response = await fetch(ANILIST_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: QUERY, variables: { id: Number(id) } })
            });
            const json = await response.json();
            animeData = json.data.Media;
            malId = animeData.idMal;
            
            console.log('Anime loaded:', animeData.title.romaji, 'malId:', malId);
            
            // Set hero background
            const bannerUrl = animeData.bannerImage || animeData.coverImage?.extraLarge;
            setHeroBackground(bannerUrl);
            
            // Check JSON for episodes
            const hasJsonEpisodes = checkJsonAnime();
            console.log('Has JSON episodes:', hasJsonEpisodes);
            
            renderAnime(animeData);
        }
        
        function safeImg(src) {
            if (!src) return FALLBACK_IMG;
            const invalidPatterns = ['default.jpg', 'placeholder', 'no-image', 'missing'];
            const lowerSrc = src.toLowerCase();
            if (invalidPatterns.some(pattern => lowerSrc.includes(pattern))) {
                return FALLBACK_IMG;
            }
            return src;
        }
        
        function stripHtml(html) {
            if (!html) return "No description available.";
            const temp = document.createElement('div');
            temp.innerHTML = html;
            return temp.textContent || temp.innerText || "";
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Get total episodes
        function getTotalEpisodes() {
            if (jsonEpisodeMap.size > 0) {
                return Math.max(...Array.from(jsonEpisodeMap.keys()));
            } else if (animeData) {
                if (animeData.status === "RELEASING" && animeData.nextAiringEpisode) {
                    return animeData.nextAiringEpisode.episode - 1;
                } else if (animeData.status === "FINISHED") {
                    return animeData.episodes || 0;
                }
            }
            return 0;
        }
        
        // Populate episode dropdown
        function populateEpisodeDropdown() {
            const dropdown = document.getElementById("episodeDropdown");
            const total = getTotalEpisodes();
            
            dropdown.innerHTML = '<option value="">-- Choose Episode --</option>';
            
            if (total === 0) {
                dropdown.innerHTML += '<option disabled>No episodes available</option>';
                return;
            }
            
            // Group episodes - show all episodes
            for (let i = 1; i <= total; i++) {
                const option = document.createElement("option");
                option.value = i;
                option.textContent = `Episode ${i}`;
                dropdown.appendChild(option);
            }
            
            dropdown.onchange = (e) => {
                if (e.target.value) {
                    selectEpisode(parseInt(e.target.value));
                }
            };
        }
        
        function selectEpisode(ep) {
            currentEpisode = ep;
            document.getElementById("episodeDropdown").value = currentEpisode;
            renderSources();
        }
        
        function renderSources() {
            const srcContainer = document.getElementById("sources");
            srcContainer.innerHTML = "";
            
            console.log('Rendering sources for episode:', currentEpisode);
            console.log('JSON episode map has episode:', jsonEpisodeMap.has(currentEpisode));
            
            if (jsonEpisodeMap.has(currentEpisode)) {
                const sources = jsonEpisodeMap.get(currentEpisode);
                console.log('Found sources:', sources.length);
                
                sources.forEach((source, idx) => {
                    const btn = document.createElement("button");
                    btn.className = "source-btn";
                    // Label like "SUB [Censored]" or "SUB [Uncensored]"
                    const label = source.isUncensored ? "SUB [Uncensored]" : "SUB [Censored]";
                    btn.textContent = label;
                    
                    btn.onclick = () => {
                        document.querySelectorAll(".source-btn").forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                        
                        const embedUrl = `https://streamtape.com/e/${source.vidcode}`;
                        document.getElementById("player").innerHTML = `
                            <iframe src="${embedUrl}" allowfullscreen class="player-iframe"></iframe>
                        `;
                    };
                    
                    if (idx === 0) {
                        btn.classList.add("active");
                        const embedUrl = `https://streamtape.com/e/${source.vidcode}`;
                        document.getElementById("player").innerHTML = `
                            <iframe src="${embedUrl}" allowfullscreen class="player-iframe"></iframe>
                        `;
                    }
                    
                    srcContainer.appendChild(btn);
                });
            } else if (malId && currentEpisode) {
                console.log('Using fallback sources for malId:', malId);
                const sources = [
                    { name: "SUB", url: `https://megaplay.buzz/stream/mal/${malId}/${currentEpisode}/sub` },
                    { name: "DUB", url: `https://megaplay.buzz/stream/mal/${malId}/${currentEpisode}/dub` }
                ];
                
                sources.forEach((src, idx) => {
                    const btn = document.createElement("button");
                    btn.className = "source-btn";
                    btn.textContent = src.name;
                    
                    btn.onclick = () => {
                        document.querySelectorAll(".source-btn").forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                        
                        document.getElementById("player").innerHTML = `
                            <iframe src="${src.url}" allowfullscreen class="player-iframe"></iframe>
                        `;
                    };
                    
                    if (idx === 0) {
                        btn.classList.add("active");
                        document.getElementById("player").innerHTML = `
                            <iframe src="${src.url}" allowfullscreen class="player-iframe"></iframe>
                        `;
                    }
                    
                    srcContainer.appendChild(btn);
                });
            } else {
                srcContainer.innerHTML = '<p class="text-gray-400 text-sm">No streaming sources available for this episode.</p>';
            }
        }
        
        function renderAnime(media) {
            const title = media.title?.english || media.title?.romaji || media.title?.native || "Unknown";
            const description = stripHtml(media.description);
            const score = media.averageScore ? (media.averageScore / 10).toFixed(1) : "N/A";
            const year = media.startDate?.year || "TBA";
            const format = media.format || "TV";
            const hasJson = jsonEpisodeMap.size > 0;
            
            let airingInfo = "";
            if (media.status === "RELEASING" && media.nextAiringEpisode) {
                const ep = media.nextAiringEpisode.episode;
                const sec = media.nextAiringEpisode.timeUntilAiring;
                const days = Math.floor(sec / 86400);
                const hours = Math.floor((sec % 86400) / 3600);
                const minutes = Math.floor((sec % 3600) / 60);
                airingInfo = `<div class="status-pill mt-3"><i class="fas fa-clock accent-red"></i> Next Episode ${ep}: ${days}d ${hours}h ${minutes}m</div>`;
            } else if (media.status === "FINISHED") {
                airingInfo = `<div class="status-pill mt-3"><i class="fas fa-check-circle" style="color: #10b981;"></i> Completed • ${media.episodes || '?'} Episodes</div>`;
            }
            
            // Hide loading, show sections
            document.getElementById("loadingState").classList.add("hidden");
            document.getElementById("info").classList.remove("hidden");
            document.getElementById("watchSection").classList.remove("hidden");
            document.getElementById("charactersSection").classList.remove("hidden");
            document.getElementById("staffSection").classList.remove("hidden");
            document.getElementById("recSection").classList.remove("hidden");
            
            // Render info
            document.getElementById("info").innerHTML = `
                <div class="flex flex-col md:flex-row gap-6">
                    <div class="flex-shrink-0 w-full md:w-56">
                        <img src="${safeImg(media.coverImage?.extraLarge || media.coverImage?.large)}" 
                             class="rounded-xl shadow-2xl w-full object-cover border border-white/10" 
                             alt="${escapeHtml(title)}">
                    </div>
                    <div class="flex-1">
                        <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold text-white mb-2">${escapeHtml(title)}</h1>
                        <div class="flex flex-wrap items-center gap-3 mb-3">
                            <div class="flex items-center gap-1">
                                <i class="fas fa-star accent-red text-sm"></i>
                                <span class="text-white font-semibold text-sm">${score}</span>
                            </div>
                            <div class="w-px h-4 bg-white/20"></div>
                            <div class="flex items-center gap-1">
                                <i class="fas fa-play accent-red text-sm"></i>
                                <span class="text-white/80 text-sm">${escapeHtml(format)}</span>
                            </div>
                            <div class="w-px h-4 bg-white/20"></div>
                            <div class="flex items-center gap-1">
                                <i class="fas fa-calendar-alt accent-red text-sm"></i>
                                <span class="text-white/80 text-sm">${year}</span>
                            </div>
                            <div class="w-px h-4 bg-white/20"></div>
                            <div class="flex items-center gap-1">
                                <i class="fas fa-tv accent-red text-sm"></i>
                                <span class="text-white/80 text-sm">${media.episodes || "?"} eps</span>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-3">
                            ${media.genres?.slice(0, 5).map(g => `<span class="genre-tag"><i class="fas fa-hashtag accent-red text-[9px] mr-1"></i>${escapeHtml(g)}</span>`).join("") || ""}
                        </div>
                        <p class="text-white/70 text-sm leading-relaxed mb-3 synopsis-clamp">${escapeHtml(description.substring(0, 400))}${description.length > 400 ? '...' : ''}</p>
                        ${airingInfo}
                    </div>
                </div>
            `;
            
            // Populate episodes dropdown
            populateEpisodeDropdown();
            
            // Characters
            if (media.characters?.edges?.length) {
                document.getElementById("characters-grid").innerHTML = media.characters.edges.slice(0, 9).map(edge => {
                    const char = edge.node;
                    const va = edge.voiceActors?.[0];
                    return `
                        <div class="bg-black/30 rounded-xl p-3 flex gap-3 border border-white/5">
                            <img src="${safeImg(char.image?.large)}" class="w-16 h-20 rounded-lg object-cover" alt="${escapeHtml(char.name.full)}">
                            <div class="flex-1 min-w-0">
                                <p class="font-bold text-sm text-white truncate">${escapeHtml(char.name.full)}</p>
                                <p class="text-xs text-gray-300">${escapeHtml(edge.role || "Character")}</p>
                                ${va ? `<p class="text-xs text-gray-300 mt-1 truncate">${escapeHtml(va.name.full)} <span class="text-[10px] text-gray-400">(${va.languageV2})</span></p>` : ""}
                            </div>
                        </div>
                    `;
                }).join("");
            } else {
                document.getElementById("characters-grid").innerHTML = '<p class="text-gray-400 text-sm col-span-full">No character data available.</p>';
            }
            
            // Staff
            if (media.staff?.edges?.length) {
                document.getElementById("staff-grid").innerHTML = media.staff.edges.slice(0, 12).map(edge => {
                    const staff = edge.node;
                    return `
                        <div class="text-center">
                            <img src="${safeImg(staff.image?.large)}" class="w-16 h-16 rounded-full mx-auto object-cover border border-white/10" alt="${escapeHtml(staff.name.full)}">
                            <p class="text-xs font-medium mt-2 text-white truncate">${escapeHtml(staff.name.full)}</p>
                            <p class="text-[10px] text-gray-400 truncate">${escapeHtml(edge.role || "Staff")}</p>
                        </div>
                    `;
                }).join("");
            } else {
                document.getElementById("staff-grid").innerHTML = '<p class="text-gray-400 text-sm col-span-full">No staff data available.</p>';
            }
            
            // Recommendations
            if (media.recommendations?.edges?.length) {
                document.getElementById("recommendations-grid").innerHTML = media.recommendations.edges.map(edge => {
                    const rec = edge.node.mediaRecommendation;
                    const recTitle = rec.title?.english || rec.title?.romaji || "Anime";
                    const recScore = rec.averageScore ? (rec.averageScore / 10).toFixed(1) : "N/A";
                    return `
                        <a href="anime.html?id=${rec.id}" class="rec-card block">
                            <div class="bg-black/30 rounded-xl overflow-hidden border border-white/5 hover:border-[#ff4444]/30 transition-all">
                                <img src="${safeImg(rec.coverImage?.large)}" class="w-full aspect-[2/3] object-cover" alt="${escapeHtml(recTitle)}">
                                <div class="p-2">
                                    <p class="text-xs font-medium text-white line-clamp-2 recommendation-title">${escapeHtml(recTitle)}</p>
                                    <div class="flex items-center gap-1 mt-1">
                                        <i class="fas fa-star text-yellow-500 text-[9px]"></i>
                                        <span class="text-[10px] text-gray-300">${recScore}</span>
                                    </div>
                                </div>
                            </div>
                        </a>
                    `;
                }).join("");
            } else {
                document.getElementById("recommendations-grid").innerHTML = '<p class="text-gray-400 text-sm col-span-full">No recommendations available.</p>';
            }
        }
        
        fetchAnime();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, height=device-height">
    <title>AnimeNeek | Trending Anime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505;
        }
        
        /* Desktop Background */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            transition: opacity 0.4s ease;
        }
        
        /* Desktop overlay - with slight blur for text pop */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0.25) 100%);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 1;
        }
        
        /* Main container */
        .main-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .main-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .main-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .main-container::-webkit-scrollbar-thumb {
            background: #ff4444;
            border-radius: 4px;
        }
        
        /* Content wrapper - desktop */
        .content-wrapper {
            width: 100%;
            max-width: 1400px;
            padding: 2rem 6%;
            display: flex;
            gap: 4rem;
            align-items: center;
            justify-content: space-between;
        }
        
        /* Left content - wide space */
        .content-left {
            flex: 1;
            max-width: 60%;
        }
        
        /* Right poster */
        .poster-right {
            flex-shrink: 0;
            width: 300px;
        }
        
        /* NO DARK CONTAINER - text directly on background */
        .info-text {
            color: white;
        }
        
        /* Watch button */
        .btn-watch {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        
        .btn-watch:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .btn-watch:hover .play-icon {
            color: #ff4444;
        }
        
        .play-icon {
            transition: color 0.25s ease;
        }
        
        /* Accent colors */
        .accent-red {
            color: #ff4444;
        }
        
        /* Genre tags - semi transparent */
        .genre-tag {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        /* Status pills - semi transparent */
        .status-pill {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        /* Synopsis */
        .synopsis {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        
        /* Poster image */
        .poster-img {
            width: 100%;
            border-radius: 1.25rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        /* Title with text shadow */
        .title {
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }
        
        /* ===== CIRCLES DOTS ===== */
        .dots-container {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 20;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .dot.active {
            background: #ff4444;
            width: 12px;
            height: 12px;
            transform: scale(1);
            box-shadow: 0 0 8px #ff4444;
        }
        
        .dot:hover {
            background: #ff4444;
            transform: scale(1.1);
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top: 3px solid #ff4444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ===== MOBILE STYLES ===== */
        @media (max-width: 768px) {
            .content-wrapper {
                flex-direction: column;
                padding: 0 1rem 5rem 1rem;
                gap: 0;
                min-height: 100vh;
                justify-content: center;
            }
            
            .poster-right {
                display: none;
            }
            
            .content-left {
                max-width: 100%;
                width: 100%;
                text-align: center;
            }
            
            /* Center alignment for mobile */
            .info-text {
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            
            /* Padding top on mobile - title bit down */
            .title-section {
                margin-top: 15vh;
                margin-bottom: 1rem;
            }
            
            .title {
                font-size: 1.75rem !important;
                text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            }
            
            /* Center meta section */
            .meta-section {
                width: 100%;
            }
            
            .meta-section .flex {
                justify-content: center;
            }
            
            /* Center genres */
            .genres-section {
                width: 100%;
            }
            
            #genresContainer {
                justify-content: center;
            }
            
            .genre-tag {
                background: rgba(0, 0, 0, 0.5);
                font-size: 0.65rem;
                padding: 0.25rem 0.8rem;
            }
            
            /* Justify synopsis */
            .synopsis-section {
                width: 100%;
                padding: 0 0.5rem;
            }
            
            .synopsis {
                text-align: justify;
                text-shadow: 0 1px 3px rgba(0,0,0,0.5);
                font-size: 0.85rem;
                line-height: 1.6;
            }
            
            /* Center status pills */
            .status-section {
                width: 100%;
            }
            
            #episodeStatus {
                justify-content: center;
            }
            
            .status-pill {
                background: rgba(0, 0, 0, 0.5);
                font-size: 0.7rem;
                padding: 0.35rem 0.8rem;
            }
            
            /* Center watch button */
            .btn-watch {
                margin: 0 auto;
            }
            
            .dots-container {
                bottom: 15px;
                gap: 8px;
                padding: 6px 15px;
            }
            
            .dot {
                width: 6px;
                height: 6px;
            }
            
            .dot.active {
                width: 10px;
                height: 10px;
            }
            
            /* Mobile background - poster image with lighter overlay */
            .mobile-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                z-index: 0;
            }
            
            /* Lighter overlay - background clearly visible */
            .mobile-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(180deg, 
                    rgba(0,0,0,0.15) 0%, 
                    rgba(0,0,0,0.35) 50%,
                    rgba(0,0,0,0.55) 100%);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                z-index: 1;
            }
        }
        
        /* Desktop styles */
        @media (min-width: 769px) {
            .mobile-bg, .mobile-overlay {
                display: none;
            }
        }
        
        @media (min-width: 1024px) {
            .poster-right {
                width: 320px;
            }
            
            .title {
                font-size: 2.5rem !important;
            }
            
            .content-left {
                max-width: 58%;
            }
        }
        
        @media (min-width: 1440px) {
            .poster-right {
                width: 360px;
            }
            
            .content-left {
                max-width: 55%;
            }
        }
        
        ::-webkit-scrollbar {
            display: none;
        }
        
        .title {
            word-break: break-word;
            line-height: 1.3;
        }
        
        /* Fixed sections to prevent jumping - desktop only */
        @media (min-width: 769px) {
            .title-section {
                min-height: 100px;
            }
            
            .meta-section {
                min-height: 36px;
            }
            
            .genres-section {
                min-height: 44px;
            }
            
            .synopsis-section {
                min-height: 120px;
            }
            
            .status-section {
                min-height: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
    </div>

    <!-- Desktop Background (banner image) -->
    <img id="bgImage" class="hero-bg" src="" alt="">
    <div class="overlay"></div>
    
    <!-- Mobile Background (POSTER image with blur) -->
    <img id="mobileBgImage" class="mobile-bg" src="" alt="">
    <div class="mobile-overlay"></div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="content-wrapper">
            <!-- Left side - Info (NO DARK BACKGROUND) -->
            <div class="content-left">
                <div class="info-text">
                    <!-- Title Section -->
                    <div class="title-section">
                        <h1 id="animeTitle" class="title text-2xl md:text-3xl lg:text-4xl font-bold text-white leading-tight mb-3"></h1>
                    </div>
                    
                    <!-- Meta Section -->
                    <div class="meta-section mb-4">
                        <div class="flex flex-wrap items-center gap-3">
                            <div class="flex items-center gap-1">
                                <i class="fas fa-star accent-red text-sm"></i>
                                <span id="animeScore" class="text-white font-semibold text-sm">0</span>
                            </div>
                            <div class="w-px h-4 bg-white/30"></div>
                            <div class="flex items-center gap-1">
                                <i class="fas fa-play accent-red text-sm"></i>
                                <span id="animeType" class="text-white/90 text-sm"></span>
                            </div>
                            <div class="w-px h-4 bg-white/30"></div>
                            <div class="flex items-center gap-1">
                                <i class="fas fa-calendar-alt accent-red text-sm"></i>
                                <span id="animeYear" class="text-white/90 text-sm"></span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Genres Section -->
                    <div class="genres-section mb-4">
                        <div id="genresContainer" class="flex flex-wrap gap-2"></div>
                    </div>
                    
                    <!-- Synopsis Section -->
                    <div class="synopsis-section mb-5">
                        <p id="animeSynopsis" class="synopsis text-white/90 text-sm leading-relaxed"></p>
                    </div>
                    
                    <!-- Status Section -->
                    <div class="status-section mb-5">
                        <div id="episodeStatus" class="flex flex-wrap gap-2"></div>
                    </div>
                    
                    <!-- Watch Button -->
                    <button id="watchNowBtn" class="btn-watch">
                        <i class="fas fa-play play-icon"></i>
                        <span>Watch Now</span>
                    </button>
                </div>
            </div>
            
            <!-- Right side - Poster (Desktop only) -->
            <div class="poster-right">
                <img id="posterImg" class="poster-img" src="" alt="Poster">
            </div>
        </div>
    </div>

    <!-- Circles Dots -->
    <div id="dotsContainer" class="dots-container"></div>

    <script>
        const ANILIST_API = 'https://graphql.anilist.co';
        
        let animeList = [];
        let currentIndex = 0;
        
        const TRENDING_LIST_QUERY = `
        query {
            Page(page: 1, perPage: 25) {
                media(sort: TRENDING_DESC, type: ANIME, isAdult: false) {
                    id
                    title {
                        romaji
                        english
                        native
                    }
                    coverImage {
                        extraLarge
                        large
                    }
                    bannerImage
                    description
                    averageScore
                    format
                    status
                    episodes
                    nextAiringEpisode {
                        airingAt
                        timeUntilAiring
                        episode
                    }
                    startDate {
                        year
                    }
                    genres
                }
            }
        }
        `;
        
        async function fetchTrendingList() {
            try {
                const response = await fetch(ANILIST_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({ query: TRENDING_LIST_QUERY })
                });
                const data = await response.json();
                
                if (data.errors) throw new Error(data.errors[0].message);
                
                animeList = data.data.Page.media;
                
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }, 300);
                
                if (animeList.length > 0) {
                    renderAnime(animeList[0]);
                    renderDots();
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingOverlay').style.display = 'none';
                useFallbackData();
            }
        }
        
        function useFallbackData() {
            animeList = [{
                id: 154587,
                title: { english: "Frieren: Beyond Journey's End", romaji: "Sousou no Frieren" },
                coverImage: { extraLarge: "https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx154587-2Jid0N1MlVhb.jpg" },
                bannerImage: "https://s4.anilist.co/file/anilistcdn/media/anime/banner/154587-RJgyEHixtdJg.jpg",
                description: "After the party of heroes defeated the Demon King, they disbanded. The elven mage Frieren, who lived a long life, promised to reunite with her former companions.",
                averageScore: 89,
                format: "TV",
                status: "FINISHED",
                episodes: 28,
                startDate: { year: 2023 },
                genres: ["Adventure", "Drama", "Fantasy"]
            }];
            renderAnime(animeList[0]);
            renderDots();
        }
        
        function stripHtml(html) {
            if (!html) return "No description available.";
            const temp = document.createElement('div');
            temp.innerHTML = html;
            return temp.textContent || temp.innerText || "";
        }
        
        function formatCountdown(seconds) {
            if (!seconds) return "Unknown";
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            
            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m`;
            return "Soon";
        }
        
        function renderEpisodeStatus(anime) {
            const container = document.getElementById('episodeStatus');
            
            if (anime.status === "RELEASING") {
                const episodesAired = anime.nextAiringEpisode?.episode ? anime.nextAiringEpisode.episode - 1 : (anime.episodes || '?');
                const countdown = anime.nextAiringEpisode?.timeUntilAiring ? formatCountdown(anime.nextAiringEpisode.timeUntilAiring) : null;
                
                container.innerHTML = `
                    <div class="status-pill">
                        <i class="fas fa-clock accent-red"></i>
                        <span>Released: ${episodesAired} eps</span>
                    </div>
                    ${countdown ? `
                    <div class="status-pill">
                        <i class="fas fa-hourglass-half accent-red"></i>
                        <span>Next: ${countdown}</span>
                    </div>
                    ` : ''}
                `;
            } 
            else if (anime.status === "FINISHED") {
                const totalEpisodes = anime.episodes || '??';
                container.innerHTML = `
                    <div class="status-pill">
                        <i class="fas fa-check-circle" style="color: #10b981;"></i>
                        <span>Completed • ${totalEpisodes} ${totalEpisodes === 1 ? 'Episode' : 'Episodes'}</span>
                    </div>
                `;
            }
            else {
                container.innerHTML = `
                    <div class="status-pill">
                        <i class="fas fa-info-circle"></i>
                        <span>${anime.status || 'Unknown'}</span>
                    </div>
                `;
            }
        }
        
        function renderAnime(anime) {
            if (!anime) return;
            
            // Desktop: banner background
            let bgUrl = anime.bannerImage || anime.coverImage?.extraLarge;
            if (bgUrl) {
                const desktopBg = document.getElementById('bgImage');
                desktopBg.style.opacity = '0';
                desktopBg.src = bgUrl;
                setTimeout(() => { desktopBg.style.opacity = '1'; }, 50);
            }
            
            // Mobile: POSTER image as background
            const posterBgUrl = anime.coverImage?.extraLarge || anime.coverImage?.large;
            if (posterBgUrl) {
                const mobileBg = document.getElementById('mobileBgImage');
                mobileBg.src = posterBgUrl;
            }
            
            // Desktop Poster
            if (posterBgUrl) {
                document.getElementById('posterImg').src = posterBgUrl;
            }
            
            // Title
            const title = anime.title?.english || anime.title?.romaji || anime.title?.native || "Unknown";
            document.getElementById('animeTitle').innerText = title;
            
            // Score
            const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : 'N/A';
            document.getElementById('animeScore').innerText = score;
            
            // Format
            const formatMap = {
                'TV': 'TV Series', 'TV_SHORT': 'TV Short', 'MOVIE': 'Movie',
                'OVA': 'OVA', 'ONA': 'ONA', 'SPECIAL': 'Special'
            };
            const format = formatMap[anime.format] || anime.format || 'Anime';
            document.getElementById('animeType').innerText = format;
            
            // Year
            const year = anime.startDate?.year || 'TBA';
            document.getElementById('animeYear').innerText = year;
            
            // Genres
            const genresContainer = document.getElementById('genresContainer');
            genresContainer.innerHTML = '';
            if (anime.genres && anime.genres.length > 0) {
                anime.genres.slice(0, 6).forEach(genre => {
                    const genreTag = document.createElement('span');
                    genreTag.className = 'genre-tag';
                    genreTag.innerHTML = `<i class="fas fa-hashtag accent-red text-[9px] mr-1"></i>${genre}`;
                    genresContainer.appendChild(genreTag);
                });
            }
            
            // Description
            const cleanDesc = stripHtml(anime.description);
            let descText = cleanDesc;
            if (descText.length > 380) {
                descText = descText.substring(0, 380) + '...';
            }
            document.getElementById('animeSynopsis').innerText = descText || "No synopsis available.";
            
            renderEpisodeStatus(anime);
            
            const watchBtn = document.getElementById('watchNowBtn');
            watchBtn.onclick = () => {
                window.location.href = `anime.html?id=${anime.id}`;
            };
            
            updateActiveDot();
        }
        
        function nextAnime() {
            if (animeList.length === 0) return;
            currentIndex = (currentIndex + 1) % animeList.length;
            renderAnime(animeList[currentIndex]);
        }
        
        function prevAnime() {
            if (animeList.length === 0) return;
            currentIndex = (currentIndex - 1 + animeList.length) % animeList.length;
            renderAnime(animeList[currentIndex]);
        }
        
        function goToIndex(index) {
            if (index >= 0 && index < animeList.length) {
                currentIndex = index;
                renderAnime(animeList[currentIndex]);
            }
        }
        
        function renderDots() {
            const container = document.getElementById('dotsContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < animeList.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.addEventListener('click', () => goToIndex(i));
                container.appendChild(dot);
            }
            updateActiveDot();
        }
        
        function updateActiveDot() {
            const dots = document.querySelectorAll('.dot');
            const total = dots.length;
            
            dots.forEach((dot, idx) => {
                dot.classList.remove('active');
                dot.style.opacity = '';
                dot.style.transform = '';
                
                if (idx === currentIndex) {
                    dot.classList.add('active');
                }
                
                // Fade effect for ends
                if (idx < 3 && idx !== currentIndex) {
                    const fadeLevel = 1 - (idx / 4);
                    dot.style.opacity = Math.max(0.2, fadeLevel * 0.4);
                    dot.style.transform = `scale(${0.5 + (idx * 0.1)})`;
                } else if (idx > total - 4 && idx !== currentIndex) {
                    const fadeLevel = (total - idx - 1) / 3;
                    dot.style.opacity = Math.max(0.2, fadeLevel * 0.4);
                    dot.style.transform = `scale(${0.5 + ((total - idx - 1) * 0.1)})`;
                } else if (idx !== currentIndex) {
                    dot.style.opacity = '0.5';
                    dot.style.transform = 'scale(0.8)';
                }
            });
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevAnime();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextAnime();
            }
        });
        
        // Mobile swipe
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    prevAnime();
                } else {
                    nextAnime();
                }
            }
        });
        
        fetchTrendingList();
    </script>
</body>
</html>
